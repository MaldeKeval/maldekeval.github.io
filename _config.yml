# Jekyll / GitHub Pages project site
title: Keval Malde | Telecom Systems Engineer
description: >-
  5G RAN software engineer focused on telecom systems, performance
  optimization, and practical network automation.
url: "https://maldekeval.github.io"
lang: en

# Author
author: Keval Ashok Malde
email: maldekeval@gmail.com

# Minima 2.x (matches typical github-pages gem) — social footer icons
github_username: kevalMalde
linkedin_username: maldekeval
social:
  name: Keval Ashok Malde
  links:
    - https://github.com/kevalMalde
    - https://www.linkedin.com/in/maldekeval/

# Build
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Minima: top navigation
header_pages:
  - index.md
  - about.md

# jekyll-feed
feed:
  posts_limit: 5

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
